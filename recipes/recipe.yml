---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/kukaraf/devpod
name: devpod
description: Personal Fedora Silverblue image.

labels:
  ostree.bootable: "true"

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43

# module configuration, executed in order
modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: gschema-overrides
    include:
      - zz1-defaults.gschema.override

  - type: bling
    install:
      - dconf-update-service

  - type: rpm-ostree
    repos:
      - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
      - https://cli.github.com/packages/rpm/gh-cli.repo
    install:
      - tailscale
      - gh
      - stow
      - btop
      - distrobox
      - syncthing
      - fzf
      - steam-devices

  - type: flatpak
    install:
      - flathub:io.github.v81d.Wattage
      - flathub:com.ranfdev.DistroShelf
      - flathub:md.obsidian.Obsidian
      - flathub:it.mijorus.gearlever
      - flathub:app.grayjay.Grayjay
      - flathub:net.codelogistics.webapps
      - flathub:com.rioterm.Rio
      - flathub:com.valvesoftware.Steam
      - flathub:de.haeckerfelix.Shortwave
      - flathub:com.mattjakeman.ExtensionManager
      - flathub:io.mpv.Mpv
      - flathub:com.github.xournalpp.xournalpp
      - flathub:org.localsend.localsend_app
      - flathub:de.haeckerfelix.Fragments
      - fedora:org.keepassxc.KeePassXC

  - type: signing
