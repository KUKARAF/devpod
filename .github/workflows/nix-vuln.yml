name: Nix vulnerability scan

on:
  push:
    branches: [master]
    paths:
      - '.config/home-manager/**'
  schedule:
    - cron: '0 3 * * 1'  # weekly Monday 03:00 UTC

jobs:
  vulnix:
    name: CVE scan (vulnix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build home-manager activation package
        run: |
          nix build ./.config/home-manager#homeConfigurations.rafa.activationPackage \
            --out-link /tmp/hm-result

      - name: Run vulnix
        run: |
          nix run nixpkgs#vulnix -- \
            --whitelist .config/home-manager/vulnix-whitelist.toml \
            --json /tmp/hm-result \
            | tee vulnix-report.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnix-report
          path: vulnix-report.json
